<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:#03060C; font-family:'DM Sans',sans-serif; color:#E4DFD0; }

#bg-canvas, #river-canvas { position:absolute; top:0; left:0; pointer-events:none; }

.nw {

#topbar {

.tname { font-family:'Instrument Serif',serif; font-size:15px; color:#D4A03C; }
.tsep  { width:1px; height:16px; background:rgba(255,255,255,0.1); flex-shrink:0; }
.tsub  { font-size:10px; color:#383832; letter-spacing:.04em; white-space:nowrap; }
#t-pills { display:flex; gap:4px; }
.tpill {

#t-btns { margin-left:auto; display:flex; gap:6px; align-items:center; }

.tbtn:disabled { opacity:.24; cursor:not-allowed; }
.tbtn-r { border:1px solid rgba(239,68,68,.32); background:rgba(239,68,68,.09); color:#EF4444; }
.tbtn-g { border:1px solid rgba(34,197,94,.32);  background:rgba(34,197,94,.09);  color:#22C55E; }
.tbtn-s { border:1px solid rgba(255,255,255,.1);  background:transparent; color:#7A7670; display:none; }

#panel {

#ph .phs { font-size:8px; color:#2A2A24; letter-spacing:.14em; text-transform:uppercase; }
#p-loops { flex-shrink:0; }
.lrow { padding:8px 14px; cursor:pointer; border-left:2px solid transparent; transition:all .18s; }

.lr-name { font-size:10.5px; font-weight:500; color:#7A7670; display:flex; align-items:center; gap:7px; margin-bottom:2px; transition:color .18s; }

.ts { font-family:'JetBrains Mono',monospace; font-size:7px; color:#7A7670; margin-bottom:5px; }
.tl { font-size:8.5px; margin-top:2px; }

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   LAYOUT & RENDER ENGINE ‚ÄĒ edit below only to change visualization behavior
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */

/* Auto-placement patterns: da=angular offset from sectorAngle, dr=radial offset (design px @640ref) */
const PLACE = {
  1:[{da:0,dr:55}],
  2:[{da:-20,dr:30},{da:20,dr:30}],
  3:[{da:-24,dr:0},{da:0,dr:58},{da:24,dr:0}],
  4:[{da:-22,dr:0},{da:22,dr:0},{da:-16,dr:66},{da:16,dr:66}],
  5:[{da:-26,dr:0},{da:0,dr:0},{da:26,dr:0},{da:-18,dr:70},{da:18,dr:70}],
};

const GOLD='#D4A03C';
let W,H,CX,CY,DPR,bgCtx,rvCtx;
let allNodes={}, allEdges=[], edgeState=[];
let focusLoop=-1, hovNode=null;
let cascading=false, cascMode=null, cascTimers=[];
const activeEdges=new Set(), activeNodes=new Set();

function h2rgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}
function rgba(hex,a){return`rgba(${h2rgb(hex)},${a})`;}
function a2r(d){return d*Math.PI/180;}
function qBez(t,ax,ay,bx,by,cx,cy){const m=1-t;return{x:m*m*ax+2*m*t*bx+t*t*cx,y:m*m*ay+2*m*t*by+t*t*cy};}

/* Flat-top hex polygon points string, centered at (cx,cy), circumradius R */
function hexPts(cx,cy,R){
  return Array.from({length:6},(_,i)=>{
    const a=a2r(i*60);
    return`${cx+R*Math.cos(a)},${cy+R*Math.sin(a)}`;
  }).join(' ');
}

/* ‚ĒÄ‚ĒÄ Compute layout ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
function computeLayout(){
  const lay=ATLAS_CONFIG.layout, ref=Math.min(W,H);
  const R_sh=ref*lay.sharedRingFrac, R_base=ref*lay.uniqueBaseFrac, sc=ref/640;
  allNodes={};
  ATLAS_CONFIG.sharedNodes.forEach(n=>{
    const a=a2r(n.angle);
    allNodes[n.id]={...n,shared:true,R:lay.sharedHexR,cx:CX+R_sh*Math.cos(a),cy:CY+R_sh*Math.sin(a)};
  });
  ATLAS_CONFIG.loops.forEach(loop=>{
    const pat=PLACE[loop.nodes.length]||PLACE[3];
    loop.nodes.forEach((n,i)=>{
      const p=pat[i]||{da:0,dr:0}, a=a2r(loop.sectorAngle+p.da), r=R_base+p.dr*sc;
      allNodes[n.id]={...n,shared:false,loop:loop.id,R:lay.uniqueHexR,cx:CX+r*Math.cos(a),cy:CY+r*Math.sin(a)};
    });
  });
  allEdges=[];
  ATLAS_CONFIG.loops.forEach(loop=>loop.edges.forEach(e=>allEdges.push({...e,loopId:loop.id,color:loop.color})));
  edgeState=allEdges.map(()=>({dash:Math.random()*50,waveT:-1,pts:Array.from({length:2},(_,j)=>({t:j*.52+Math.random()*.06,sp:.00042+Math.random()*.00022}))}));
}

/* ‚ĒÄ‚ĒÄ Bezier control point ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
function getCP(fx,fy,tx,ty,fb){
  const mx=(fx+tx)/2,my=(fy+ty)/2,dx=mx-CX,dy=my-CY,dist=Math.sqrt(dx*dx+dy*dy)||1;
  const ex=tx-fx,ey=ty-fy,el=Math.sqrt(ex*ex+ey*ey)||1,px=-ey/el,py=ex/el;
  if(fb){
    if(dist<W*.038)return{x:mx+px*W*.1,y:my+py*W*.1};
    return{x:mx+(dx/dist)*Math.min(dist*.78,W*.14),y:my+(dy/dist)*Math.min(dist*.78,H*.14)};
  }
  if(dist<W*.046)return{x:mx+px*W*.058,y:my+py*H*.058};
  if(dist<W*.09){const push=(W*.09-dist)+W*.055;return{x:mx+(dx/dist)*push,y:my+(dy/dist)*push};}
  return{x:mx-(dx/dist)*W*.016,y:my-(dy/dist)*W*.016};
}

/* ‚ĒÄ‚ĒÄ Arrow at bezier end ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
function drawArrow(ctx,fx,fy,cpx,cpy,ex,ey,col,alpha,sw){
  const p0=qBez(0.84,fx,fy,cpx,cpy,ex,ey);
  const dx=ex-p0.x,dy=ey-p0.y,dl=Math.sqrt(dx*dx+dy*dy)||1;
  const ux=dx/dl,uy=dy/dl,px=-uy,py=ux;
  const al=sw*2.1,aw=sw*1.1;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-ux*al+px*aw,ey-uy*al+py*aw);
  ctx.lineTo(ex-ux*al-px*aw,ey-uy*al-py*aw);
  ctx.closePath();
  ctx.fillStyle=rgba(col,alpha);
  ctx.shadowColor=col;ctx.shadowBlur=sw*1.6;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   BACKGROUND ‚ÄĒ hex grid, sector fills, center aura (drawn on resize)
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function drawBg(){
  const ctx=bgCtx;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#03060C'; ctx.fillRect(0,0,W,H);

  /* Flat-top hex grid */
  const hR=29, hW=hR*2, hH=hR*Math.sqrt(3);
  ctx.strokeStyle='rgba(212,160,60,0.034)'; ctx.lineWidth=0.5;
  for(let col=-1;col*hW*.75<W+hW;col++){
    for(let row=-1;row*hH<H+hH;row++){
      const hx=col*hW*.75, hy=row*hH+(col%2===0?0:hH/2);
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=a2r(i*60);ctx.lineTo(hx+hR*Math.cos(a),hy+hR*Math.sin(a));}
      ctx.closePath(); ctx.stroke();
    }
  }

  /* Sector fills */
  const Rmax=Math.max(W,H)*.7;
  ATLAS_CONFIG.loops.forEach((loop,i)=>{
    const a1=a2r(-90+i*60-30), a2=a2r(-90+i*60+30);
    const gr=ctx.createRadialGradient(CX,CY,W*.05,CX,CY,Rmax*.6);
    gr.addColorStop(0,rgba(loop.color,0));
    gr.addColorStop(.32,rgba(loop.color,.02));
    gr.addColorStop(1,rgba(loop.color,.005));
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,Rmax*.6,a1,a2);ctx.closePath();
    ctx.fillStyle=gr;ctx.fill();
  });

  /* Center aura */
  const au=ctx.createRadialGradient(CX,CY,0,CX,CY,W*.32);
  au.addColorStop(0,rgba(GOLD,.065));au.addColorStop(.38,rgba(GOLD,.018));au.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=au;ctx.fillRect(0,0,W,H);

  /* Inner hex ring dashed guide */
  const ref=Math.min(W,H), Rg=ref*ATLAS_CONFIG.layout.sharedRingFrac*1.12;
  ctx.strokeStyle=rgba(GOLD,.08);ctx.lineWidth=0.7;ctx.setLineDash([3,10]);
  ctx.beginPath();ctx.arc(CX,CY,Rg,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);

  /* Center hex medallion */
  const mR=ref*.098;
  ctx.strokeStyle=rgba(GOLD,.11);ctx.lineWidth=0.8;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=a2r(i*60-30),px=CX+mR*Math.cos(a),py=CY+mR*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
  ctx.closePath();ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle=rgba(GOLD,.30);ctx.font="bold 7px 'JetBrains Mono'";ctx.fillText('ATLAS',CX,CY-4);
  ctx.fillStyle=rgba(GOLD,.15);ctx.font="5.8px 'DM Sans'";ctx.fillText('6 loops ¬∑ 6 shared',CX,CY+7);
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   RENDER LOOP
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function render(){
  const ctx=rvCtx; ctx.clearRect(0,0,W,H);

  allEdges.forEach((edge,ei)=>{
    const fn=allNodes[edge.from],tn=allNodes[edge.to];
    if(!fn||!tn) return;
    const es=edgeState[ei], col=edge.color;
    const isActive=activeEdges.has(ei);
    const inFocus=focusLoop===-1||focusLoop===edge.loopId;
    const hovRel=hovNode&&(edge.from===hovNode||edge.to===hovNode||allNodes[hovNode]?.loops?.includes(edge.loopId)||allNodes[hovNode]?.loop===edge.loopId);

    let op;
    if(hovNode)           op=hovRel?(edge.feedback?.50:.70):.018;
    else if(focusLoop!==-1) op=inFocus?(edge.feedback?.46:.66):.016;
    else                    op=edge.feedback?.19:.32;

    const sw=edge.feedback?7:9;

    /* Trim endpoints to hex perimeter */
    const trim=(from,to,r)=>{const dx=to.cx-from.cx,dy=to.cy-from.cy,d=Math.sqrt(dx*dx+dy*dy)||1;return{x:to.cx-(dx/d)*r,y:to.cy-(dy/d)*r};};
    const S=trim(tn,fn,fn.R+3), E=trim(fn,tn,tn.R+3);
    const cp=getCP(fn.cx,fn.cy,tn.cx,tn.cy,edge.feedback);

    /* Layer 1: atmospheric halo */
    ctx.beginPath();ctx.moveTo(S.x,S.y);ctx.quadraticCurveTo(cp.x,cp.y,E.x,E.y);
    ctx.strokeStyle=rgba(col,op*.13);ctx.lineWidth=sw+20;ctx.lineCap='round';ctx.stroke();

    /* Layer 2: mid glow */
    ctx.beginPath();ctx.moveTo(S.x,S.y);ctx.quadraticCurveTo(cp.x,cp.y,E.x,E.y);
    ctx.strokeStyle=rgba(col,op*.34);ctx.lineWidth=sw+9;ctx.stroke();

    /* Layer 3: dashed river body */
    es.dash=(es.dash+(edge.feedback?.10:.15))%60;
    ctx.beginPath();ctx.moveTo(S.x,S.y);ctx.quadraticCurveTo(cp.x,cp.y,E.x,E.y);
    ctx.strokeStyle=rgba(col,op);ctx.lineWidth=sw;
    ctx.setLineDash(edge.feedback?[9,8]:[15,7]);ctx.lineDashOffset=-es.dash;ctx.stroke();ctx.setLineDash([]);

    /* Arrow */
    if(op>.025) drawArrow(ctx,S.x,S.y,cp.x,cp.y,E.x,E.y,col,op*.88,sw);

    /* Flowing particles */
    if(inFocus&&!isActive&&op>.07){
      es.pts.forEach(p=>{
        p.t=(p.t+p.sp)%1;
        const pt=qBez(p.t,S.x,S.y,cp.x,cp.y,E.x,E.y);
        ctx.save();ctx.beginPath();ctx.arc(pt.x,pt.y,2.1,0,Math.PI*2);
        ctx.fillStyle=rgba(col,op*.78);ctx.shadowColor=col;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;ctx.restore();
      });
    }

    /* Cascade wave */
    if(isActive&&es.waveT>=0){
      const wc=cascMode==='policy'?'#22C55E':'#EF4444',wt=es.waveT;
      for(let tr=8;tr>=0;tr--){
        const bt=Math.max(0,wt-tr*.028),bp=qBez(bt,S.x,S.y,cp.x,cp.y,E.x,E.y);
        ctx.beginPath();ctx.arc(bp.x,bp.y,3.4-tr*.32,0,Math.PI*2);
        ctx.fillStyle=rgba(wc,(1-tr/9)*.58);ctx.fill();
      }
      const lp=qBez(wt,S.x,S.y,cp.x,cp.y,E.x,E.y);
      ctx.save();ctx.beginPath();ctx.arc(lp.x,lp.y,7,0,Math.PI*2);
      ctx.fillStyle=rgba(wc,.94);ctx.shadowColor=wc;ctx.shadowBlur=26;ctx.fill();ctx.shadowBlur=0;ctx.restore();
    }
  });

  /* Cross-loop gold arcs */
  ATLAS_CONFIG.crossLinks.forEach(xl=>{
    const fn=allNodes[xl.from],tn=allNodes[xl.to];if(!fn||!tn)return;
    const cp=xl.cpFn(W,H), op=focusLoop===-1?.36:.055;
    ctx.beginPath();ctx.moveTo(fn.cx,fn.cy);ctx.quadraticCurveTo(cp.x,cp.y,tn.cx,tn.cy);
    ctx.strokeStyle=rgba(GOLD,op*.13);ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(fn.cx,fn.cy);ctx.quadraticCurveTo(cp.x,cp.y,tn.cx,tn.cy);
    ctx.strokeStyle=rgba(GOLD,op);ctx.lineWidth=2.2;ctx.setLineDash([5,9]);
    ctx.lineDashOffset=-(edgeState[0]?.dash*.55||0);ctx.stroke();ctx.setLineDash([]);
    if(op>.04) drawArrow(ctx,fn.cx,fn.cy,cp.x,cp.y,tn.cx,tn.cy,GOLD,op*.8,4);
    const lp=qBez(.5,fn.cx,fn.cy,cp.x,cp.y,tn.cx,tn.cy);
    ctx.font="6.5px 'JetBrains Mono'";ctx.textAlign='center';
    ctx.fillStyle=rgba(GOLD,op*.72);ctx.fillText(xl.label,lp.x,lp.y-9);
  });

  requestAnimationFrame(render);
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   DOM HEX NODES
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function buildNodes(){
  const layer=document.getElementById('node-layer');
  layer.innerHTML='';

  Object.values(allNodes).forEach(n=>{
    const R=n.R, pad=2;
    const svgW=R*2+pad*2, svgH=R*Math.sqrt(3)+pad*2;
    const ox=svgW/2, oy=svgH/2;
    const pts=hexPts(ox,oy,R);
    const lc=n.shared?GOLD:ATLAS_CONFIG.loops[n.loop].color;
    const lines=n.label.split('\n');
    const fz=n.shared?10.5:9.5, sfz=n.shared?6.2:6;
    const lh=fz*1.28, totalH=lines.length*lh;
    const ly0=oy-totalH/2+fz*(n.shared?0.85:0.8);

    /* Multi-loop color strips for shared nodes */
    const strips=n.shared
      ? n.loops.map((li,si)=>{
          const stripW=(R*1.52)/n.loops.length, stripX=ox-R*.76+si*stripW;
          return`<rect x="${stripX.toFixed(1)}" y="${(oy+R*.6).toFixed(1)}" width="${stripW.toFixed(1)}" height="2.5" fill="${ATLAS_CONFIG.loops[li].color}" opacity="0.68" rx="0.5"/>`;
        }).join('')
      : `<rect x="${(ox-R*.72).toFixed(1)}" y="${(oy+R*.6).toFixed(1)}" width="${(R*1.44).toFixed(1)}" height="2.2" fill="${lc}" opacity="0.55" rx="0.5"/>`;

    const labelEls=lines.map((line,i)=>
      `<text x="${ox.toFixed(1)}" y="${(ly0+i*lh).toFixed(1)}" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="${fz}" font-weight="500" fill="${n.shared?GOLD:'#E4DFD0'}" opacity="${n.shared?1:.9}">${line}</text>`
    ).join('');

    const subEl=`<text x="${ox.toFixed(1)}" y="${(oy+R*.52+sfz).toFixed(1)}" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="${sfz}" fill="${n.shared?'rgba(212,160,60,0.38)':'rgba(255,255,255,0.2)'}">${n.sub}</text>`;

    const wrap=document.createElement('div');
    wrap.className='nw'; wrap.id=`nw-${n.id}`;
    wrap.style.left=`${n.cx}px`; wrap.style.top=`${n.cy}px`;
    wrap.innerHTML=`<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" overflow="visible">
      <polygon id="poly-${n.id}" points="${pts}" fill="${lc}" fill-opacity="${n.shared?.08:.065}" stroke="${lc}" stroke-opacity="${n.shared?.44:.28}" stroke-width="${n.shared?1.3:1}"/>
      ${strips}${labelEls}${subEl}
    </svg>`;

    wrap.addEventListener('mouseenter',e=>onHover(n.id,e));
    wrap.addEventListener('mouseleave',onLeave);
    wrap.addEventListener('click',()=>onNodeClick(n));
    layer.appendChild(wrap);
  });
}

function updateNodes(){
  Object.values(allNodes).forEach(n=>{
    const el=document.getElementById(`nw-${n.id}`);if(!el)return;
    const lps=n.loops||(n.loop!=null?[n.loop]:[]);
    const inFocus=focusLoop===-1||lps.includes(focusLoop);
    const isLit=activeNodes.has(n.id);
    const lc=n.shared?GOLD:ATLAS_CONFIG.loops[n.loop].color;

    let op=1;
    if(hovNode&&hovNode!==n.id){
      const hn=allNodes[hovNode],hnl=hn?.loops||(hn?.loop!=null?[hn.loop]:[]);
      op=lps.some(l=>hnl.includes(l))?1:.09;
    } else if(focusLoop!==-1){
      op=inFocus?1:.08;
    } else {
      op=n.shared?1:.52;
    }
    el.style.opacity=op;

    const poly=document.getElementById(`poly-${n.id}`);if(!poly)return;
    if(isLit){
      const wc=cascMode==='policy'?'#22C55E':'#EF4444';
      poly.setAttribute('stroke',wc);poly.setAttribute('stroke-opacity','0.95');
      poly.setAttribute('stroke-width',n.shared?'2.2':'1.9');poly.setAttribute('fill-opacity','0.18');
      el.style.filter=`drop-shadow(0 0 9px ${wc})`;
    } else {
      poly.setAttribute('stroke',lc);
      poly.setAttribute('stroke-opacity',n.shared?'0.44':'0.28');
      poly.setAttribute('stroke-width',n.shared?'1.3':'1');
      poly.setAttribute('fill-opacity',n.shared?'0.08':'0.065');
      el.style.filter=(focusLoop!==-1&&inFocus)?`drop-shadow(0 0 5px ${rgba(lc,.32)})`:'none';
    }
  });
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   INTERACTION
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function setFocus(li){
  focusLoop=li; stopCascade();
  document.querySelectorAll('.tpill').forEach(p=>{
    const v=parseInt(p.dataset.l);
    const act=(v===-1&&li===-1)||(v===li);
    const lc=v>=0?ATLAS_CONFIG.loops[v]?.color:GOLD;
    p.style.borderColor=act?(v===-1?'rgba(212,160,60,.42)':lc+'80'):'rgba(255,255,255,.08)';
    p.style.background=act?(v===-1?'rgba(212,160,60,.1)':lc+'1A'):'transparent';
    p.style.color=act?(v===-1?GOLD:lc):'#7A7670';
  });
  ATLAS_CONFIG.loops.forEach((loop,i)=>{
    const r=document.getElementById(`lr-${i}`);if(!r)return;
    const act=li===i;
    r.style.borderLeftColor=act?loop.color:'transparent';
    r.style.background=act?rgba(loop.color,.065):'';
    r.querySelector('.lr-name').style.color=act?'#E4DFD0':'#7A7670';
    r.querySelector('.lr-tag').style.color=act?loop.color:'#2A2A24';
    r.querySelector('.lr-dot').style.boxShadow=act?`0 0 7px ${loop.color}`:'none';
  });
  updatePanelDetail(li);
  updateNodes();
}

function onHover(id,e){
  hovNode=id;const n=allNodes[id];if(!n)return;
  const lps=n.loops||(n.loop!=null?[n.loop]:[]),lc=n.shared?GOLD:ATLAS_CONFIG.loops[n.loop].color;
  document.getElementById('tt-n').textContent=n.label.replace('\n',' ');
  document.getElementById('tt-n').style.color=lc;
  document.getElementById('tt-s').textContent=n.sub;
  const td=document.getElementById('tt-l');td.innerHTML='';
  lps.forEach(li=>{const d=document.createElement('div');d.className='tl';d.style.color=ATLAS_CONFIG.loops[li].color;d.textContent=`‚óŹ L${li+1}: ${ATLAS_CONFIG.loops[li].name}`;td.appendChild(d);});
  document.getElementById('tip').style.borderColor=rgba(lc,.38);
  document.getElementById('tip').classList.add('on');
  moveTip(e);updateNodes();
}
function onLeave(){hovNode=null;document.getElementById('tip').classList.remove('on');updateNodes();}
function onNodeClick(n){
  if(n.shared){setFocus(-1);return;}
  setFocus(focusLoop===n.loop?-1:n.loop);
}
document.addEventListener('mousemove',e=>{if(hovNode)moveTip(e);});
function moveTip(e){const t=document.getElementById('tip');t.style.left=Math.min(e.clientX+14,window.innerWidth-188)+'px';t.style.top=Math.max(e.clientY-8,4)+'px';}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
   CASCADE
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function buildCascadeSeq(){
  const byLoop=Array.from({length:ATLAS_CONFIG.loops.length},()=>[]);
  allEdges.forEach((e,i)=>byLoop[e.loopId].push(i));
  const phStart=[0,0,2400,2400,5100,4800];
  return byLoop.flatMap((arr,li)=>arr.map((ei,s)=>({ei,li,delay:phStart[li]+s*425}))).sort((a,b)=>a.delay-b.delay);
}
const PHASE_LABELS=['‚Ü≥ Phase I ¬∑ AI Displacement & Revenue Pressure','‚Ü≥ Phase II ¬∑ Phillips / Wage Dynamics','‚Ü≥ Phase III ¬∑ Demand Collapse & Spillover','‚Ü≥ Phase IV ¬∑ Credit Crunch','‚Ü≥ Phase V ¬∑ Fiscal‚ÄďMonetary Stress','‚Ü≥ Phase VI ¬∑ Housing Wealth Destruction'];

function runCascade(mode){
  if(cascading)return;
  cascading=true;cascMode=mode;setFocus(-1);
  document.getElementById('btn-cr').disabled=true;
  document.getElementById('btn-po').disabled=true;
  document.getElementById('btn-st').style.display='inline-block';
  const tick=document.getElementById('ticker');
  tick.style.color=mode==='policy'?'#22C55E':'#EF4444';
  const steps=buildCascadeSeq(),total=Math.max(...steps.map(s=>s.delay))+2200;
  steps.forEach(({ei,li,delay})=>{
    cascTimers.push(setTimeout(()=>{
      activeEdges.add(ei);activeNodes.add(allEdges[ei].from);
      tick.textContent=PHASE_LABELS[li]||'';tick.classList.add('on');updateNodes();
      const dur=555,t0=performance.now();
      (function wave(ts){
        const t=Math.min((ts-t0)/dur,1);edgeState[ei].waveT=t;
        if(t<1){requestAnimationFrame(wave);}
        else{activeNodes.add(allEdges[ei].to);updateNodes();setTimeout(()=>{edgeState[ei].waveT=-1;activeEdges.delete(ei);},400);}
      })(performance.now());
    },delay));
  });
  cascTimers.push(setTimeout(stopCascade,total));
}
function stopCascade(){
  cascTimers.forEach(clearTimeout);cascTimers=[];
  cascading=false;cascMode=null;
  activeEdges.clear();activeNodes.clear();
  allEdges.forEach((_,i)=>{edgeState[i]&&(edgeState[i].waveT=-1);});
  document.getElementById('btn-cr').disabled=false;
  document.getElementById('btn-po').disabled=false;
  document.getElementById('btn-st').style.display='none';
  document.getElementById('ticker').classList.remove('on');
  updateNodes();
}

   SIDE PANEL BUILD
‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function buildPanel(){
  const pills=document.getElementById('t-pills');
  ATLAS_CONFIG.loops.forEach((loop,i)=>{
    const p=document.createElement('button');p.className='tpill';p.dataset.l=i;
    p.textContent=`L${i+1}`;p.onclick=()=>setFocus(focusLoop===i?-1:i);pills.appendChild(p);
  });
  const lbox=document.getElementById('p-loops');
  ATLAS_CONFIG.loops.forEach((loop,i)=>{
    const r=document.createElement('div');r.className='lrow';r.id=`lr-${i}`;

    lbox.appendChild(r);
  });
  updatePanelDetail(-1);
  setFocus(-1); // trigger pill styling for "All" active
}
function updatePanelDetail(li){
  const desc=document.getElementById('p-desc'),sv=document.getElementById('p-sv'),xl=document.getElementById('p-xl'),svl=document.getElementById('sv-lbl');
  if(li===-1){
    desc.textContent='Six feedback loops model AI automation\'s economic impact. Gold hexagon nodes are shared variables ‚ÄĒ each connects across multiple loops, transmitting shocks system-wide. Select a loop to isolate its causal chain.';
    svl.textContent='Shared Variables';
    sv.innerHTML=ATLAS_CONFIG.sharedNodes.map(n=>`<span class="sv-chip">${n.label}</span>`).join('');
    xl.innerHTML='<div class="sl" style="margin-top:10px;margin-bottom:6px">Cross-Loop Links</div>'+ATLAS_CONFIG.crossLinks.map(x=>`<div class="xl-row">${x.label}</div>`).join('');
  } else {
    const loop=ATLAS_CONFIG.loops[li];
    desc.textContent=loop.desc;svl.textContent='Shared Vars Used';
    sv.innerHTML=ATLAS_CONFIG.sharedNodes.filter(n=>n.loops.includes(li)).map(n=>`<span class="sv-chip" style="color:${loop.color};border-color:${rgba(loop.color,.28)};background:${rgba(loop.color,.09)}">${n.label}</span>`).join('');
    xl.innerHTML='';
  }
}

function setupCanvas(){
  DPR=window.devicePixelRatio||1;
  W=window.innerWidth-228; H=window.innerHeight; CX=W/2; CY=H/2;
  ['bg-canvas','river-canvas'].forEach(id=>{
    const el=document.getElementById(id);
    el.width=W*DPR;el.height=H*DPR;el.style.width=W+'px';el.style.height=H+'px';
    const ctx=el.getContext('2d');ctx.setTransform(DPR,0,0,DPR,0,0);
    if(id==='bg-canvas')bgCtx=ctx; else rvCtx=ctx;
  });
}

function init(){
  setupCanvas();computeLayout();drawBg();buildNodes();buildPanel();
  requestAnimationFrame(render);
}

let resizeTm;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTm);resizeTm=setTimeout(()=>{
    setupCanvas();computeLayout();drawBg();buildNodes();updateNodes();
  },160);
});

init();
